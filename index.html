<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תהליך החתימה</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { max-height: 64px; max-width: 200px; margin-bottom: 28px; object-fit: contain; }
    .icon { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; font-weight: 700; }
    .sub { font-size: 16px; color: #444; margin-bottom: 6px; }
    .sub strong { color: #1a1a2e; }
    .next-label { font-size: 15px; color: #666; margin-bottom: 28px; }
    .next-label strong { color: #2563eb; }
    .progress-bar-bg {
      background: #e5e7eb;
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-bar-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 999px;
      width: 0%;
      transition: width 20s linear;
    }
    .warning {
      font-size: 13px;
      color: #b45309;
      background: #fef3c7;
      border-radius: 8px;
      padding: 8px 14px;
      display: inline-block;
    }
    .done-icon { font-size: 56px; margin-bottom: 16px; }
    .done-title { font-size: 24px; color: #15803d; font-weight: 700; margin-bottom: 10px; }
    .done-sub { font-size: 16px; color: #555; }
    .error-text { color: #dc2626; font-size: 15px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card" id="card"></div>
  <script>
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    var params   = new URLSearchParams(window.location.search);
    var logo      = params.get('logo');
    var next      = params.get('next');
    var form      = params.get('form');
    var signed    = params.get('signed');
    var remaining = parseInt(params.get('remaining') || '-1', 10);
    var card      = document.getElementById('card');

    var logoHtml = logo
      ? '<img class="logo" src="' + esc(logo) + '" alt="" onerror="this.style.display=\'none\'" />'
      : '';

    if (isNaN(remaining) || remaining < 0) {
      card.innerHTML = logoHtml + '<p class="error-text">שגיאה בטעינת הדף — אנא פנה למנהל</p>';

    } else if (remaining === 0) {
      card.innerHTML =
        logoHtml +
        '<div class="done-icon">🎉</div>' +
        '<div class="done-title">סיימת לחתום על כל המסמכים!</div>' +
        '<div class="done-sub">תהליך הקליטה הושלם בהצלחה.<br/>נתראה בעבודה!</div>';

    } else if (!next) {
      card.innerHTML = logoHtml + '<p class="error-text">שגיאה — קישור לטופס הבא חסר. אנא פנה למנהל</p>';

    } else {
      var signedLabel = signed ? esc(decodeURIComponent(signed)) : 'המסמך';
      var formLabel   = form   ? esc(decodeURIComponent(form))   : 'הטופס הבא';

      card.innerHTML =
        logoHtml +
        '<div class="icon">✅</div>' +
        '<h1>איזה כיף, השלמת בהצלחה חתימה על ' + signedLabel + '</h1>' +
        '<p class="sub">נותרו עוד <strong>' + remaining + '</strong> מסמכים להצטרף למשפחת יומנגס.</p>' +
        '<p class="next-label">קדימה, מיד מעבירים אותך למסמך <strong>' + formLabel + '</strong></p>' +
        '<div class="progress-bar-bg"><div class="progress-bar-fill" id="bar"></div></div>' +
        '<span class="warning">⚠️ אל תסגור את הדף</span>';

      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          var bar = document.getElementById('bar');
          if (bar) bar.style.width = '100%';
        });
      });

      var destination = decodeURIComponent(next);
      setTimeout(function() {
        window.location.href = destination;
      }, 20000);
    }
  </script>
</body>
</html>
