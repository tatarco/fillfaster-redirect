<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תהליך החתימה</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { max-height: 64px; max-width: 200px; margin-bottom: 28px; object-fit: contain; }
    .icon { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; font-weight: 700; }
    .sub { font-size: 16px; color: #444; margin-bottom: 6px; }
    .sub strong { color: #1a1a2e; }
    .next-label { font-size: 15px; color: #666; margin-bottom: 24px; }
    .next-label strong { color: #2563eb; }

    .progress-bar-bg {
      background: #e5e7eb;
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 12px;
      position: relative;
    }
    .progress-bar-bg.shimmer::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: -55%;
      width: 55%;
      background: linear-gradient(90deg, transparent 0%, #2563eb 40%, #60a5fa 60%, transparent 100%);
      border-radius: 999px;
      animation: shimmer-slide 1.6s ease-in-out infinite;
    }
    @keyframes shimmer-slide {
      0%   { left: -55%; }
      100% { left: 110%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .progress-bar-bg.shimmer::after { animation: none; left: 20%; width: 60%; opacity: 0.6; }
    }

    .progress-bar-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 999px;
      width: 0%;
    }

    .status-msg {
      font-size: 13px;
      color: #6b7280;
      min-height: 20px;
      margin-bottom: 16px;
      transition: opacity 0.35s ease;
    }
    .status-msg.fade { opacity: 0; }

    .continue-btn {
      display: none;
      margin-top: 20px;
      background: #2563eb;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      cursor: pointer;
      text-decoration: none;
      width: 100%;
      text-align: center;
    }
    .continue-btn:active { background: #1d4ed8; }
    .done-icon { font-size: 56px; margin-bottom: 16px; }
    .done-title { font-size: 24px; color: #15803d; font-weight: 700; margin-bottom: 10px; }
    .done-sub { font-size: 16px; color: #555; }
    .error-text { color: #dc2626; font-size: 15px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card" id="card"></div>
  <script>
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    var params    = new URLSearchParams(window.location.search);
    var logo      = params.get('logo');
    var next      = params.get('next');
    var form      = params.get('form');
    var signed    = params.get('signed');
    var remaining = parseInt(params.get('remaining') || '-1', 10);
    var card      = document.getElementById('card');

    var logoHtml = logo
      ? '<img class="logo" src="' + esc(logo) + '" alt="" onerror="this.style.display=\'none\'" />'
      : '';

    if (isNaN(remaining) || remaining < 0) {
      card.innerHTML = logoHtml + '<p class="error-text">שגיאה בטעינת הדף — אנא פנה למנהל</p>';

    } else if (remaining === 0) {
      card.innerHTML =
        logoHtml +
        '<div class="done-icon">🎉</div>' +
        '<div class="done-title">סיימת לחתום על כל המסמכים!</div>' +
        '<div class="done-sub">תהליך הקליטה הושלם בהצלחה.<br/>נתראה בעבודה!</div>';

    } else if (!next) {
      card.innerHTML = logoHtml + '<p class="error-text">שגיאה — קישור לטופס הבא חסר. אנא פנה למנהל</p>';

    } else {
      var signedLabel = signed ? esc(decodeURIComponent(signed)) : 'המסמך';
      var formLabel   = form   ? esc(decodeURIComponent(form))   : 'הטופס הבא';
      var candidateId = params.get('candidateId');
      var afterFormId = params.get('afterFormId');

      card.innerHTML =
        logoHtml +
        '<div class="icon">✅</div>' +
        '<h1>איזה כיף, השלמת בהצלחה חתימה על ' + signedLabel + '</h1>' +
        '<p class="sub">נותרו עוד <strong>' + remaining + '</strong> מסמכים להצטרף למשפחת יומנגס.</p>' +
        '<p class="next-label">קדימה, מיד מעבירים אותך למסמך <strong>' + formLabel + '</strong></p>' +
        '<div class="progress-bar-bg shimmer" id="bar-bg"><div class="progress-bar-fill" id="bar"></div></div>' +
        '<p class="status-msg" id="status-msg">מכין את הטופס הבא...</p>' +
        '<a class="continue-btn" id="continue-btn" href="#">המשך לחתימה הבאה ←</a>';

      var destination = decodeURIComponent(next);
      var startTime   = Date.now();
      var navigated   = false;

      var MESSAGES = [
        'מכין את הטופס הבא...',
        'מחבר בין המסמכים...',
        'כמעט מוכן...',
        'עוד שנייה ומעבירים אותך...',
      ];
      var msgIndex = 0;
      var msgEl = document.getElementById('status-msg');

      function rotateMessage() {
        if (navigated || !msgEl) return;
        msgEl.classList.add('fade');
        setTimeout(function() {
          if (navigated || !msgEl) return;
          msgIndex = (msgIndex + 1) % MESSAGES.length;
          msgEl.textContent = MESSAGES[msgIndex];
          msgEl.classList.remove('fade');
        }, 350);
      }
      var msgTimer = setInterval(rotateMessage, 2500);

      function navigateTo(url) {
        if (navigated) return;
        navigated = true;
        clearInterval(msgTimer);
        if (msgEl) { msgEl.textContent = '✓ מוכן! מעביר אותך...'; msgEl.classList.remove('fade'); }
        var barBg = document.getElementById('bar-bg');
        var bar   = document.getElementById('bar');
        if (barBg) barBg.classList.remove('shimmer');
        if (bar)   { bar.style.transition = 'width 0.3s ease'; bar.style.width = '100%'; }
        setTimeout(function() { window.location.href = url; }, 300);
      }

      function showButton(url) {
        var btn = document.getElementById('continue-btn');
        if (btn) { btn.style.display = 'block'; btn.href = url; }
      }

      if (candidateId) {
        var MIN_WAIT_MS    = 3000;
        var MAX_WAIT_MS    = 20000;
        var POLL_INTERVAL  = 1500;

        function poll() {
          if (navigated) return;
          if (Date.now() - startTime >= MAX_WAIT_MS) {
            showButton(destination);
            navigateTo(destination);
            return;
          }

          fetch('https://biz-flow-erp-6829504d.base44.app/api/functions/getNextSigningLink?candidateId=' + encodeURIComponent(candidateId) + '&afterFormId=' + encodeURIComponent(afterFormId || ''))
            .then(function(r) { return r.json(); })
            .then(function(data) {
              if (navigated) return;
              if (data.ready && data.signatureLink) {
                var wait = Math.max(0, MIN_WAIT_MS - (Date.now() - startTime));
                setTimeout(function() {
                  if (!navigated) { showButton(data.signatureLink); navigateTo(data.signatureLink); }
                }, wait);
              } else {
                setTimeout(poll, POLL_INTERVAL);
              }
            })
            .catch(function() { setTimeout(poll, POLL_INTERVAL); });
        }

        setTimeout(poll, 500);
        setTimeout(function() { if (!navigated) { showButton(destination); navigateTo(destination); } }, MAX_WAIT_MS);

      } else {
        setTimeout(function() { navigateTo(destination); }, 8000);
        setTimeout(function() { showButton(destination); }, 8000);
      }
    }
  </script>
</body>
</html>
